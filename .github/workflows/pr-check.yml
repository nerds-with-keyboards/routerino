name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  quick-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Use Node.js
      uses: actions/setup-node@v2
      with:
        node-version: "20"

    - name: Install dependencies
      run: npm ci

    - name: Install test app dependencies
      run: |
        cd test-apps/vite-app && npm install
        cd ../vite-app-no-trailing && npm install

    - name: Lint
      run: npm run lint

    - name: Build
      run: npm run build
